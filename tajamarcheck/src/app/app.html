<main class="min-h-screen flex flex-col bg-[#030508] relative overflow-hidden">
  <!-- Efecto de Brillo Sutil que sigue al cursor (Aceleración de Hardware) -->
  <div class="mouse-glow"></div>

  <!-- Círculos de luz de fondo (Mesh Gradients) Globales para toda la App (Efecto Neon Blur) -->
  <div class="absolute -top-60 -left-60 w-[700px] h-[700px] bg-indigo-600/10 rounded-full blur-[150px] pointer-events-none select-none animate-fadeIn"></div>
  <div class="absolute top-1/3 left-1/4 w-[600px] h-[600px] bg-purple-600/8 rounded-full blur-[150px] pointer-events-none select-none"></div>
  <div class="absolute -bottom-60 -right-60 w-[700px] h-[700px] bg-emerald-600/5 rounded-full blur-[150px] pointer-events-none select-none"></div>

  <!-- Header Dinámico Autónomo -->
  <app-header class="sticky top-0 z-50"></app-header>

  <!-- Main Content -->
  <section class="flex-1 flex flex-col items-center justify-center min-h-[calc(100vh-140px)] p-4 md:p-8 relative z-10">
    <router-outlet></router-outlet>
  </section>

  <!-- Footer Dinámico Autónomo -->
  <app-footer></app-footer>
</main>
