<main class="min-h-screen flex flex-col bg-slate-50/70 relative overflow-hidden">
  <!-- Círculos de luz de fondo (Mesh Gradients) Globales para toda la App -->
  <div class="absolute -top-48 -left-48 w-[600px] h-[600px] bg-blue-500/5 rounded-full blur-3xl pointer-events-none select-none"></div>
  <div class="absolute top-1/2 left-1/4 w-[500px] h-[500px] bg-violet-500/5 rounded-full blur-3xl pointer-events-none select-none"></div>
  <div class="absolute -bottom-48 -right-48 w-[600px] h-[600px] bg-indigo-500/5 rounded-full blur-3xl pointer-events-none select-none"></div>

  <!-- Header Premium Glassmorphism (Súper limpio y moderno) -->
  <header class="bg-white/70 backdrop-blur-md border-b border-slate-200/50 text-slate-800 shadow-sm sticky top-0 z-30">
    <div class="max-w-6xl mx-auto flex items-center justify-between py-4 px-6">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-md shadow-blue-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
          </svg>
        </div>
        <span class="text-xl font-black tracking-tight text-slate-900">TajamarCheck</span>
      </div>
      <nav>
        <span class="text-[11px] font-bold uppercase tracking-wider text-blue-700 bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100 shadow-sm flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span>
          Portal de Asistencia
        </span>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <section class="flex-1 flex flex-col items-center justify-center min-h-[calc(100vh-140px)] p-6 relative z-10">
    <router-outlet></router-outlet>
  </section>

  <!-- Footer Premium Estilizado (Limpio y Profesional) -->
  <footer class="bg-white/45 backdrop-blur-md text-slate-400 text-xs py-6 relative z-10 border-t border-slate-200/50">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between px-6 gap-4 font-semibold text-center md:text-left">
      <div>
        <span>&copy; {{ currentYear }} TajamarCheck. Todos los derechos reservados.</span>
        <span class="hidden md:inline text-slate-300 mx-2">|</span>
        <span class="block md:inline mt-1 md:mt-0 text-[10px] text-slate-400 uppercase tracking-widest">Master Full Stack</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-emerald-50 text-emerald-700 rounded-full border border-emerald-100 shadow-sm text-[10px] font-bold tracking-wider uppercase">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span>
          API Online
        </span>
      </div>
    </div>
  </footer>
</main>
