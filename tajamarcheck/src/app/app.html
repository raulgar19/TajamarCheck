<main class="min-h-screen flex flex-col bg-gray-50">
  <!-- Header -->
  <header class="bg-[#16213e] text-white shadow-md">
    <div class="max-w-6xl mx-auto flex items-center justify-between py-4 px-6">
      <span class="text-2xl font-bold tracking-tight">TajamarCheck</span>
      <nav class="flex gap-4">
        <a routerLink="/home" routerLinkActive="text-blue-300 underline" class="hover:text-blue-200 transition">Dashboard</a>
        <a routerLink="/fichaje" routerLinkActive="text-blue-300 underline" class="hover:text-blue-200 transition">Fichaje</a>
        <!-- Puedes añadir más enlaces aquí -->
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <section class="flex-1 flex flex-col items-center justify-center min-h-[calc(100vh-120px)]">
    <router-outlet></router-outlet>
  </section>

  <!-- Footer -->
  <footer class="bg-[#1a1a2e] text-gray-300 text-sm py-4 mt-8 shadow-inner">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between px-6 gap-2">
      <span>&copy; {{ currentYear }} TajamarCheck. Todos los derechos reservados.</span>
      <span class="text-blue-200">Desarrollado por el equipo Full Stack</span>
    </div>
  </footer>
</main>
