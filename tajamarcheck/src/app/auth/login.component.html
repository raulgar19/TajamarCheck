<div class="flex w-full h-full items-center justify-center">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-12 min-h-[420px] flex flex-col justify-center">
    <h2 class="text-3xl font-bold mb-8 text-center">Iniciar sesión</h2>
    <form (ngSubmit)="login()" autocomplete="off" class="space-y-6">
      <div>
        <label class="block text-base font-medium text-gray-700 mb-2">Usuario</label>
        <input [(ngModel)]="username" name="username" required class="w-full px-4 py-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg" />
      </div>
      <div>
        <label class="block text-base font-medium text-gray-700 mb-2">Contraseña</label>
        <input [(ngModel)]="password" name="password" type="password" required class="w-full px-4 py-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg" />
      </div>
      <button type="submit" [disabled]="loading" class="w-full py-3 px-4 bg-blue-600 text-white text-lg font-semibold rounded hover:bg-blue-700 transition disabled:opacity-50">{{ loading ? 'Entrando...' : 'Entrar' }}</button>
      <p class="text-red-600 text-center mt-4" *ngIf="error">{{ error }}</p>
    </form>
  </div>
</div>
