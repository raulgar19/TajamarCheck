<div class="flex flex-col items-center justify-center gap-8 p-10 bg-gradient-to-br from-blue-50 to-indigo-100 rounded-xl shadow-lg w-full max-w-md mx-auto">
  <h2 class="text-3xl font-extrabold mb-2 text-indigo-800 tracking-tight">Fichaje</h2>
  <div class="flex gap-6 mb-4">
    <button (click)="modo = 'entrada'"
      [class.bg-blue-600]="modo === 'entrada'"
      [class.text-white]="modo === 'entrada'"
      [class.bg-blue-200]="modo !== 'entrada'"
      [class.text-blue-800]="modo !== 'entrada'"
      class="px-6 py-2 rounded-lg font-semibold shadow hover:bg-blue-500 transition border-2 border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400">
      Entrada
    </button>
    <button (click)="modo = 'salida'"
      [class.bg-green-600]="modo === 'salida'"
      [class.text-white]="modo === 'salida'"
      [class.bg-green-200]="modo !== 'salida'"
      [class.text-green-800]="modo !== 'salida'"
      class="px-6 py-2 rounded-lg font-semibold shadow hover:bg-green-500 transition border-2 border-green-600 focus:outline-none focus:ring-2 focus:ring-green-400">
      Salida
    </button>
  </div>
  <button (click)="fichar()"
    class="px-10 py-3 rounded-lg bg-indigo-600 text-white text-lg font-bold shadow-lg hover:bg-indigo-700 transition focus:outline-none focus:ring-2 focus:ring-indigo-400">
    Fichar {{ modo === 'entrada' ? 'Entrada' : 'Salida' }}
  </button>
</div>
