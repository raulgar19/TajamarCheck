<div class="max-w-md w-full bg-white p-6 rounded shadow">
  <h2 class="text-xl font-semibold mb-4">Fichaje manual (Profesor)</h2>

  <label class="block mb-2">
    <span class="text-sm">ID externo del estudiante</span>
    <input [(ngModel)]="externalStudentId" class="mt-1 block w-full rounded border px-3 py-2" />
  </label>

  <label class="block mb-2">
    <span class="text-sm">ID de la sesión</span>
    <input [(ngModel)]="sessionId" class="mt-1 block w-full rounded border px-3 py-2" />
  </label>

  <label class="block mb-4">
    <span class="text-sm">Motivo</span>
    <textarea [(ngModel)]="reason" class="mt-1 block w-full rounded border px-3 py-2"></textarea>
  </label>

  <div class="flex items-center gap-3">
    <button (click)="submitManual()" class="bg-blue-600 text-white px-4 py-2 rounded" [disabled]="loading">Registrar</button>
    <span *ngIf="loading">Procesando...</span>
  </div>

  <p class="mt-4 text-sm text-red-600" *ngIf="message">{{ message }}</p>
</div>
