<div class="flex flex-col items-center gap-4 w-full">
  <h2 class="text-xl font-bold mb-2">Listado de Faltas y Retrasos</h2>
  <table class="min-w-full bg-white rounded shadow overflow-hidden">
    <thead>
      <tr class="bg-gray-100">
        <th class="px-4 py-2 text-left">Fecha</th>
        <th class="px-4 py-2 text-left">Tipo</th>
        <th class="px-4 py-2 text-left">Motivo</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let i of incidents">
        <td class="px-4 py-2 border-b">{{ i.date }}</td>
        <td class="px-4 py-2 border-b">{{ i.type }}</td>
        <td class="px-4 py-2 border-b">{{ i.motivo }}</td>
      </tr>
    </tbody>
  </table>
</div>
