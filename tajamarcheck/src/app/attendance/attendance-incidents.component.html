<div class="flex flex-col items-center justify-center gap-4 p-8">
  <h2 class="text-2xl font-bold mb-2">Faltas y Retrasos</h2>
  <div class="flex gap-8">
    <div class="flex flex-col items-center">
      <span class="text-3xl font-bold text-red-600">{{ faltas }}</span>
      <span class="text-gray-700">Faltas</span>
    </div>
    <div class="flex flex-col items-center">
      <span class="text-3xl font-bold text-yellow-600">{{ retrasos }}</span>
      <span class="text-gray-700">Retrasos</span>
    </div>
    <div class="flex flex-col items-center">
      <span class="text-3xl font-bold text-green-600">{{ justificados }}</span>
      <span class="text-gray-700">Justificados</span>
    </div>
  </div>
</div>
