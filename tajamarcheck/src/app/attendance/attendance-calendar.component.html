<div class="flex flex-col items-center gap-4">
  <h2 class="text-xl font-bold mb-2">Calendario de Asistencia</h2>
  <div class="grid grid-cols-7 gap-1 w-full max-w-md">
    <div class="text-center font-semibold text-gray-600" *ngFor="let d of ['L','M','X','J','V','S','D']">{{d}}</div>
    <ng-container *ngFor="let day of getMonthDays()">
      <div *ngIf="!day.empty; else emptyCell"
        [ngClass]="{
          'bg-red-200 text-red-800 font-bold': day.type === 'falta',
          'bg-yellow-100 text-yellow-700 font-bold': day.type === 'retraso',
          'bg-gray-100 text-gray-700': !day.type
        }"
        class="h-10 w-10 flex items-center justify-center rounded cursor-pointer relative group">
        {{ day.day }}
        <span *ngIf="day.type" class="absolute z-10 hidden group-hover:block bg-white border rounded shadow px-2 py-1 text-xs left-1/2 -translate-x-1/2 top-10 whitespace-nowrap">
          {{ day.type | titlecase }}: {{ day.motivo }}
        </span>
      </div>
      <ng-template #emptyCell>
        <div></div>
      </ng-template>
    </ng-container>
  </div>
</div>
